name: Run Forecasting Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Upgrade packaging tools
      run: python -m pip install --upgrade pip setuptools wheel

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Prepare outputs dir
      run: mkdir -p outputs

    - name: Run forecasting pipeline
      run: python src/forecasting_pipeline.py --data data/sample_sales.csv --output outputs

    - name: List outputs
      run: ls -la outputs || true

    - name: Upload outputs
      uses: actions/upload-artifact@v4
      with:
        name: forecasting-outputs
        path: outputs
